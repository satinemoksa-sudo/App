<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESD Test Record Manager</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="./tailwindcss.js"></script>
    <script src="./react.production.min.js"></script>
    <script src="./react-dom.production.min.js"></script>
    <script src="./babel.min.js"></script>
    <script src="./xlsx.bundle.js"></script>
    <script src="./chart.js"></script>
    
    <style>
        @media print {
            .print\:hidden { display: none !important; }
            .print\:bg-white { background-color: #fff !important; }
            .print\:py-0 { padding-top: 0 !important; padding-bottom: 0 !important; }
            .print\:shadow-none { box-shadow: none !important; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>

<body class="bg-gray-100 py-6 px-4 print:bg-white print:py-0">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // ─── Constants ────────────────────────────────────────────────────────────────
        const CONTACT_LEVELS = ["-2", "+2", "-4", "+4", "-6", "+6", "-8", "+8"];
        const AIR_LEVELS = ["-5", "+5", "-8", "+8", "-12", "+12", "-15", "+15"];
        const SHOT_COUNT = 10;

        const CONTACT_CLASS = {
            "-2": 1, "+2": 1, "-4": 2, "+4": 2, "-6": 3, "+6": 3, "-8": 4, "+8": 4,
        };
        const AIR_CLASS = {
            "-5": 1, "+5": 1, "-8": 2, "+8": 2, "-12": 3, "+12": 3, "-15": 4, "+15": 4,
        };

        // ─── Helpers ──────────────────────────────────────────────────────────────────
        let _id = Date.now();
        const uid = () => String(++_id);

        function makeRows(configuration, useCase, location, type) {
            const levels = type === "Contact" ? CONTACT_LEVELS : AIR_LEVELS;
            const classMap = type === "Contact" ? CONTACT_CLASS : AIR_CLASS;
            return levels.map((v) => ({
                id: uid(),
                configuration,
                useCase,
                dischargeType: type,
                dischargeClass: classMap[v],
                voltage: v,
                location,
                shots: Array(SHOT_COUNT).fill(""),
                comment: "",
            }));
        }

        function generateTimestampDocNo() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const yyyy = now.getFullYear();
            const mm = pad(now.getMonth() + 1);
            const dd = pad(now.getDate());
            const hh = pad(now.getHours());
            const min = pad(now.getMinutes());
            const ss = pad(now.getSeconds());
            return `${yyyy}${mm}${dd}-${hh}${min}${ss}`;
        }

        // ─── Pie Chart Component ──────────────────────────────────────────────────────
        function ESDPieChart({ passed, failed, naCount, ignored }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!chartRef.current) return;
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }
                const ctx = chartRef.current.getContext('2d');
                if (passed === 0 && failed === 0 && naCount === 0 && ignored === 0) {
                    return;
                }

                chartInstance.current = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['Pass', 'Fail', 'N/A', 'Ignored (-)'],
                        datasets: [{
                            data: [passed, failed, naCount, ignored],
                            backgroundColor: ['#16a34a', '#ef4444', '#6b7280', '#A1CCB1'],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { boxWidth: 12, font: { size: 11 } }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [passed, failed, naCount, ignored]);

            if (passed === 0 && failed === 0 && naCount === 0 && ignored === 0) {
                return null;
            }

            return (
                <div className="w-48 h-32 relative flex items-center justify-center bg-white p-1 rounded border border-gray-100 shrink-0">
                    <canvas ref={chartRef}></canvas>
                </div>
            );
        }

        // ─── Result Cell ──────────────────────────────────────────────────────────────
        function ResultCell({ value, onChange, rowIndex, shotIndex, tableType }) {
            const inputId = `cell-${tableType}-${rowIndex}-${shotIndex}`;

            const handleKeyDown = (e) => {
                let nextRow = rowIndex;
                let nextShot = shotIndex;

                if (e.key === "ArrowRight") nextShot += 1;
                else if (e.key === "ArrowLeft") nextShot -= 1;
                else if (e.key === "ArrowDown") nextRow += 1;
                else if (e.key === "ArrowUp") nextRow -= 1;
                else return;

                e.preventDefault();
                const nextEl = document.getElementById(`cell-${tableType}-${nextRow}-${nextShot}`);
                if (nextEl) nextEl.focus();
            };

            const handleChange = (e) => {
                let val = e.target.value.toUpperCase();
                if (val === "N") val = "NA";

                if (["P", "F", "NA", "-"].includes(val)) {
                    onChange(val);
                    setTimeout(() => {
                        let nextShot = shotIndex + 1;
                        let nextRow = rowIndex;
                        if (nextShot >= SHOT_COUNT && shotIndex !== "FT") {
                            nextShot = 0;
                            nextRow += 1;
                        } else if (shotIndex === "FT") {
                            nextRow += 1;
                            nextShot = 0;
                        }
                        const nextEl = document.getElementById(`cell-${tableType}-${nextRow}-${nextShot}`);
                        if (nextEl) nextEl.focus();
                    }, 10);
                } else if (val === "") {
                    onChange("");
                }
            };

            const bgColor = value === "P" ? "bg-green-500" : value === "F" ? "bg-red-400" : value === "NA" ? "bg-gray-300" : value === "-" ? "bg-green-100" : "bg-white";
            const textColor = value === "P" || value === "F" ? "text-white" : value === "-" ? "text-green-700" : "text-gray-700";

            return (
                <input
                    id={inputId}
                    value={value}
                    onChange={handleChange}
                    onKeyDown={handleKeyDown}
                    className={`w-full h-6 text-center text-[10px] font-bold border border-gray-200 outline-none focus:ring-2 focus:ring-blue-400 ${bgColor} ${textColor}`}
                    maxLength={2}
                />
            );
        }

        // ─── Test Point Setup Manager ─────────────────────────────────────────────────
        function TestSetupManager({ type, onGenerate }) {
            const fileRef = useRef(null);
            const [entries, setEntries] = useState([
                { id: uid(), configuration: "", useCase: "", location: "" },
            ]);

            const isContact = type === "Contact";
            const levels = isContact ? CONTACT_LEVELS : AIR_LEVELS;
            const accentText = isContact ? "text-blue-700" : "text-orange-600";
            const accentBorder = isContact ? "border-blue-200" : "border-orange-200";
            const accentBg = isContact ? "bg-blue-50" : "bg-orange-50";
            const accentBtn = isContact ? "bg-blue-600 hover:bg-blue-700" : "bg-orange-500 hover:bg-orange-600";

            const addEntry = () => setEntries((prev) => [...prev, { id: uid(), configuration: "", useCase: "", location: "" }]);
            const removeEntry = (id) => setEntries((prev) => prev.filter((e) => e.id !== id));
            const updateEntry = (id, field, value) => setEntries((prev) => prev.map((e) => (e.id === id ? { ...e, [field]: value } : e)));

            const downloadTemplate = () => {
                const ws = window.XLSX.utils.aoa_to_sheet([
                    ["Configuration", "Use Case", "Location"],
                    ...entries.map((e) => [e.configuration, e.useCase, e.location]),
                    ...Array(3).fill(["", "", ""]),
                ]);
                ws["!cols"] = [{ wch: 24 }, { wch: 24 }, { wch: 28 }];
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Setup");
                window.XLSX.writeFile(wb, `ESD_${type}_Setup_Template.xlsx`);
            };

            const handleImport = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = window.XLSX.read(new Uint8Array(ev.target?.result), { type: "array" });
                        const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                        const imported = rows.slice(1).filter((r) => r[0] || r[1] || r[2]).map((r) => ({
                            id: uid(),
                            configuration: String(r[0] ?? "").trim(),
                            useCase: String(r[1] ?? "").trim(),
                            location: String(r[2] ?? "").trim(),
                        }));
                        if (imported.length > 0) setEntries(imported);
                    } catch {
                        alert("Import failed. Please check the file format.");
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = "";
            };

            const handleGenerate = () => {
                const resultRows = [];
                levels.forEach((v) => {
                    const locationRowsForLevel = entries.map((e, index) => {
                        const rowObj = makeRows(e.configuration, e.useCase, e.location, type).find((r) => r.voltage === v);
                        if (rowObj) {
                            const locPrefix = `[${index + 1}] `;
                            rowObj.location = e.location ? `${locPrefix}${e.location}` : `${locPrefix}Position ${index + 1}`;
                        }
                        return rowObj;
                    }).filter(Boolean);

                    resultRows.push(...locationRowsForLevel);

                    if (locationRowsForLevel.length > 0) {
                        resultRows.push({
                            id: uid(),
                            configuration: "Functional Test",
                            shots: [],
                            isFTRow: true,
                            ftResult: "",
                            comment: "",
                        });
                    }
                });
                onGenerate(resultRows);
            };

            return (
                <div className={`mb-4 rounded-lg border overflow-hidden ${accentBorder}`}>
                    <div className={`flex items-center gap-2 px-4 py-2 ${accentBg} border-b ${accentBorder}`}>
                        <span className={`text-xs font-bold uppercase tracking-wide ${accentText}`}>{type} Discharge — Test Point Setup</span>
                        <span className="text-xs text-gray-400 ml-1">Voltage levels: {levels.join(", ")} kV</span>
                        <div className="flex-1" />
                        <button onClick={downloadTemplate} className="text-xs text-blue-600 hover:text-blue-800 border border-blue-200 bg-white hover:border-blue-400 px-3 py-1 rounded transition-colors">⬇ Template</button>
                        <button onClick={() => fileRef.current?.click()} className="text-xs text-green-600 hover:text-green-800 border border-green-200 bg-white hover:border-green-400 px-3 py-1 rounded transition-colors">⬆ Import</button>
                        <input ref={fileRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={handleImport} />
                    </div>
                    <div className="overflow-x-auto bg-white">
                        <table className="w-full text-sm">
                            <thead>
                                <tr className="border-b border-gray-100">
                                    <th className="px-3 py-1.5 text-left text-xs font-semibold text-gray-400 w-8">#</th>
                                    <th className="px-3 py-1.5 text-left text-xs font-semibold text-gray-400 min-w-[208px]">Configuration</th>
                                    <th className="px-3 py-1.5 text-left text-xs font-semibold text-gray-400 min-w-[176px]">Use Case</th>
                                    <th className="px-3 py-1.5 text-left text-xs font-semibold text-gray-400 min-w-[208px]">Location</th>
                                    <th className="w-10" />
                                </tr>
                            </thead>
                            <tbody>
                                {entries.map((e, i) => (
                                    <tr key={e.id} className="hover:bg-gray-50">
                                        <td className="px-3 py-1 text-xs text-gray-400 border-b border-gray-50">{i + 1}</td>
                                        <td className="px-2 py-1 border-b border-gray-50">
                                            <input className="w-full px-2 py-0.5 text-xs border border-gray-200 rounded focus:outline-none focus:border-blue-400" placeholder="e.g. 1-BM (1-Unpowered)" value={e.configuration} onChange={(ev) => updateEntry(e.id, "configuration", ev.target.value)} />
                                        </td>
                                        <td className="px-2 py-1 border-b border-gray-50">
                                            <input className="w-full px-2 py-0.5 text-xs border border-gray-200 rounded focus:outline-none focus:border-blue-400" placeholder="e.g. Carried Accessory" value={e.useCase} onChange={(ev) => updateEntry(e.id, "useCase", ev.target.value)} />
                                        </td>
                                        <td className="px-2 py-1 border-b border-gray-50">
                                            <input className="w-full px-2 py-0.5 text-xs border border-gray-200 rounded focus:outline-none focus:border-blue-400" placeholder="e.g. USBc Plug (shroud)" value={e.location} onChange={(ev) => updateEntry(e.id, "location", ev.target.value)} />
                                        </td>
                                        <td className="px-2 py-1 border-b border-gray-50 text-center">
                                            <button onClick={() => removeEntry(e.id)} className="text-gray-300 hover:text-red-400 text-lg leading-none">×</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className={`px-4 py-2 flex items-center gap-3 ${accentBg} border-t ${accentBorder}`}>
                        <button onClick={addEntry} className={`text-xs ${accentText} flex items-center gap-1 hover:opacity-70`}><span className="text-base leading-none">+</span> Add location</button>
                        <div className="flex-1" />
                        <button onClick={handleGenerate} className={`${accentBtn} text-white text-xs px-4 py-1.5 rounded transition-colors`}>Generate {type} Table →</button>
                    </div>
                </div>
            );
        }

        // ─── ESD Table ───────────────────────────────────────────────────────────────
        function ESDTable({ rows, type, onShotChange, onFTResultChange, onCommentChange, onRowFieldChange, onExport, serialNumber, docNo }) {
            const accent = type === "Contact" ? "text-blue-700" : "text-orange-600";
            const accentBg = type === "Contact" ? "bg-blue-50" : "bg-orange-50";
            const accentBorder = type === "Contact" ? "border-blue-200" : "border-orange-200";

            if (rows.length === 0) return null;
            const fullSerialDisplay = docNo ? `${serialNumber}_${docNo}` : serialNumber;

            return (
                <div className="mb-8">
                    <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2">
                            <div className={`w-1 h-5 rounded-full ${type === "Contact" ? "bg-blue-500" : "bg-orange-400"}`} />
                            <h2 className={`text-sm font-bold uppercase tracking-wide ${accent}`}>{type} Discharge</h2>
                        </div>
                        <button onClick={onExport} className={`print:hidden text-xs border px-3 py-1.5 rounded transition-colors ${accentBg} ${accentBorder} ${accent} hover:opacity-80 cursor-pointer font-medium`}>⬇ Export {type} Excel</button>
                    </div>

                    <div className="overflow-x-auto rounded border border-gray-300 shadow-sm">
                        <table className="text-xs border-collapse w-full" style={{ minWidth: 1100 }}>
                            <thead>
                                <tr className="bg-white border-b border-gray-300">
                                    <td colSpan={6} className="px-2 py-1 border-r border-gray-300 align-bottom">
                                        <span className="text-xs text-gray-500">Unit #1 Serial Number: </span>
                                        <span className="text-xs font-medium text-gray-800">{fullSerialDisplay}</span>
                                    </td>
                                    <td colSpan={SHOT_COUNT} className="px-2 py-1 text-center text-xs font-semibold text-gray-700 border-r border-gray-300">Discharge Number</td>
                                    <td className="px-2 py-1" />
                                </tr>
                                <tr className="bg-gray-50 border-b border-gray-300">
                                    <th className="px-2 py-1.5 text-left border-r border-gray-200 font-semibold text-gray-600 min-w-[160px]">Configuration</th>
                                    <th className="px-2 py-1.5 text-left border-r border-gray-200 font-semibold text-gray-600 min-w-[144px]">Use Case</th>
                                    <th className="px-2 py-1.5 text-center border-r border-gray-200 font-semibold text-gray-600 w-20">Discharge Type</th>
                                    <th className="px-2 py-1.5 text-center border-r border-gray-200 font-semibold text-gray-600 w-16">Discharge Class</th>
                                    <th className="px-2 py-1.5 text-center border-r border-gray-200 font-semibold text-gray-600 w-24">Voltage and Polarity (kV)</th>
                                    <th className="px-2 py-1.5 text-left border-r border-gray-200 font-semibold text-gray-600 min-w-[160px]">Discharge Location</th>
                                    {Array.from({ length: SHOT_COUNT }, (_, i) => (
                                        <th key={i} className="border-r border-gray-200 font-semibold text-gray-600 text-center w-7">{i + 1}</th>
                                    ))}
                                    <th className="px-2 py-1.5 text-left font-semibold text-gray-600 min-w-[160px]">Comment</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map((row, ri) => {
                                    const prevRow = ri > 0 ? rows[ri - 1] : null;
                                    const sameConfig = prevRow?.configuration === row.configuration && prevRow?.useCase === row.useCase;
                                    const isEven = ri % 2 === 0;

                                    if (row.isFTRow) {
                                        return (
                                            <tr key={row.id} className="border-b border-gray-300 bg-amber-50/70 font-semibold">
                                                <td className="px-3 py-1.5 text-amber-800 border-r border-gray-200 italic">{row.configuration}</td>
                                                <td className="px-3 py-1.5 text-gray-500 border-r border-gray-200 font-normal">{row.useCase}</td>
                                                <td className="px-2 py-1.5 border-r border-gray-200 text-center text-gray-500 font-normal">{row.dischargeType}</td>
                                                <td className="px-2 py-1.5 border-r border-gray-200 text-center text-gray-500 font-normal">{row.dischargeClass}</td>
                                                <td className="px-2 py-1.5 border-r border-gray-200 text-center text-amber-900 font-bold bg-amber-50/70">{row.voltage}</td>
                                                <td className="px-3 py-1.5 border-r border-gray-200 text-left text-amber-800 font-bold">{row.location}</td>
                                                <td colSpan={SHOT_COUNT} className="border-r border-gray-200 p-1 text-center bg-amber-100/30">
                                                    <ResultCell value={row.ftResult || ""} onChange={(v) => onFTResultChange(row.id, v)} rowIndex={ri} shotIndex="FT" tableType={type} />
                                                </td>
                                                <td className="px-1 py-0.5">
                                                    <input className="w-full px-1.5 py-1 bg-transparent border border-transparent hover:border-gray-300 focus:border-blue-400 focus:outline-none rounded text-gray-700 font-normal" placeholder="Functional test remarks..." value={row.comment} onChange={(e) => onCommentChange(row.id, e.target.value)} />
                                                </td>
                                            </tr>
                                        );
                                    }

                                    const rowBg = isEven ? "bg-white" : "bg-[#fde8e0]";
                                    return (
                                        <tr key={row.id} className={`border-b border-gray-200 ${rowBg}`}>
                                            <td className="px-1 py-0.5 border-r border-gray-200">
                                                {sameConfig ? <span className="px-2 text-gray-400 italic">"</span> : (
                                                    <input className="w-full px-1.5 py-0.5 bg-transparent border border-transparent hover:border-gray-200 focus:border-blue-400 focus:outline-none rounded text-gray-800" value={row.configuration} onChange={(e) => onRowFieldChange(row.id, "configuration", e.target.value)} />
                                                )}
                                            </td>
                                            <td className="px-1 py-0.5 border-r border-gray-200">
                                                {sameConfig ? <span className="px-2 text-gray-400 italic">"</span> : (
                                                    <input className="w-full px-1.5 py-0.5 bg-transparent border border-transparent hover:border-gray-200 focus:border-blue-400 focus:outline-none rounded text-gray-800" value={row.useCase} onChange={(e) => onRowFieldChange(row.id, "useCase", e.target.value)} />
                                                )}
                                            </td>
                                            <td className="px-2 py-0.5 border-r border-gray-200 text-center text-gray-700">{row.dischargeType}</td>
                                            <td className="px-2 py-0.5 border-r border-gray-200 text-center text-gray-700">{row.dischargeClass}</td>
                                            <td className="px-2 py-0.5 border-r border-gray-200 text-center text-gray-700">{row.voltage}</td>
                                            <td className="px-1 py-0.5 border-r border-gray-200">
                                                <input className="w-full px-1.5 py-0.5 bg-transparent border border-transparent hover:border-gray-200 focus:border-blue-400 focus:outline-none rounded text-gray-800 text-left pl-2" value={row.location} placeholder="Discharge location" onChange={(e) => onRowFieldChange(row.id, "location", e.target.value)} />
                                            </td>
                                            {row.shots.map((s, i) => (
                                                <td key={i} className="border-r border-gray-200 p-0 text-center">
                                                    <ResultCell value={s} onChange={(v) => onShotChange(row.id, i, v)} rowIndex={ri} shotIndex={i} tableType={type} />
                                                </td>
                                            ))}
                                            <td className="px-1 py-0.5">
                                                <input className="w-full px-1.5 py-0.5 bg-transparent border border-transparent hover:border-gray-200 focus:border-blue-400 focus:outline-none rounded text-gray-700" placeholder="Comment..." value={row.comment} onChange={(e) => onCommentChange(row.id, e.target.value)} />
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ─── Excel Export Helper ──────────────────────────────────────────────────────
        function exportRows(info, rows, type, filename, docNo) {
            const wb = window.XLSX.utils.book_new();
            const fullSerial = docNo ? `${info.serial}_${docNo}` : info.serial;
            
            // 1. 建立基礎測試紀錄表頭
            const sheetData = [
                ["ESD Test Record — " + type + " Discharge"],
                ["Unit Serial No.:", fullSerial, "Project:", info.project, "Stage:", info.stage],
                ["Date:", info.date, "Tester:", info.tester, "Standard:", info.standard],
                [],
                ["#", "Configuration", "Use Case", "Discharge Type", "Discharge Class", "Voltage (kV)", "Location", ...Array(10).fill("").map((_, i) => i + 1), "Comment"]
            ];

            let displayIdx = 1;

            // 2. 寫入測試數據列
            rows.forEach((r) => {
                if (r.isFTRow) {
                    const ftShots = [r.ftResult || "", "", "", "", "", "", "", "", "", ""];
                    sheetData.push(["", r.configuration, r.useCase, r.dischargeType, r.dischargeClass, r.voltage, r.location, ...ftShots, r.comment]);
                } else {
                    sheetData.push([displayIdx, r.configuration, r.useCase, r.dischargeType, r.dischargeClass, r.voltage, r.location, ...r.shots, r.comment]);
                    displayIdx++;
                }
            });

            // ─── 新增：計算當前表格的統計數據 (對應圓餅圖) ───
            let tested = 0; let passed = 0; let failed = 0; let naCount = 0; let ignored = 0;
            const failSummaries = [];

            rows.forEach((row) => {
                if (row.isFTRow) return;
                const lastShotValue = row.shots[9]; 
                const isDischargeComplete = lastShotValue && lastShotValue !== "";

                if (isDischargeComplete) {
                    if (row.shots.includes("F")) { failed += 1; tested += 1; }
                    else if (row.shots.every(s => s === "-")) { ignored += 1; }
                    else if (row.shots.every(s => s === "NA")) { naCount += 1; }
                    else if (lastShotValue === "P" || row.shots.includes("P")) { passed += 1; tested += 1; }
                }

                // 收集當前表格的失敗摘要
                if (row.shots.includes("F")) {
                    row.shots.forEach((shotVal, shotIdx) => {
                        if (shotVal === "F") {
                            const cleanLocation = row.location ? row.location.replace(/^\[\d+\]\s*/, '') : '';
                            failSummaries.push({
                                config: row.configuration, useCase: row.useCase,
                                voltage: row.voltage, location: cleanLocation, shotNum: shotIdx + 1
                            });
                        }
                    });
                }
            });

            // 3. 在表格底部附加 Summary 與統計區塊
            sheetData.push([]);
            sheetData.push([]);
            const summaryStartRow = sheetData.length; // 記錄統計區塊的起點位置

            sheetData.push(["TEST RESULT SUMMARY (統計與摘要)"]);
            sheetData.push(["Metric (項目)", "Count (數量)", "Percentage (百分比)", "", "Overall Status:", failed > 0 ? "FAIL ✗" : tested === 0 ? "—" : "PASS ✓"]);
            
            const totalSummaryCount = passed + failed + naCount + ignored;
            const getPercent = (val) => totalSummaryCount > 0 ? `${((val / totalSummaryCount) * 100).toFixed(1)}%` : "0.0%";
            
            sheetData.push(["Pass", passed, getPercent(passed)]);
            sheetData.push(["Fail", failed, getPercent(failed)]);
            sheetData.push(["N/A", naCount, getPercent(naCount)]);
            sheetData.push(["Ignored (-)", ignored, getPercent(ignored)]);
            sheetData.push(["Total Locations", totalSummaryCount, "100%"]);

            // 4. 附加 ❌ Detected Failure Details 區塊
            sheetData.push([]);
            const failureDetailStartRow = sheetData.length;
            sheetData.push(["DETECTED FAILURE DETAILS (失敗詳細清單)"]);
            
            if (failSummaries.length === 0) {
                sheetData.push(["✓ No failures detected. All test locations passed or were ignored."]);
            } else {
                sheetData.push(["#", "Configuration", "Use Case", "Voltage (kV)", "Location", "Failed Shot"]);
                failSummaries.forEach((f, fIdx) => {
                    sheetData.push([fIdx + 1, f.config, f.useCase, f.voltage, f.location, `Shot #${f.shotNum}`]);
                });
            }

            // 5. 轉換為工作表並動態計算欄寬
            const ws = window.XLSX.utils.aoa_to_sheet(sheetData);

            const colWidths = sheetData[4].map((_, colIdx) => {
                let maxLen = 5; 
                for (let i = 4; i < sheetData.length; i++) {
                    const row = sheetData[i];
                    if (row && row[colIdx] !== undefined && row[colIdx] !== null) {
                        const valStr = String(row[colIdx]);
                        const len = valStr.split('').reduce((acc, char) => acc + (char.charCodeAt(0) > 255 ? 2 : 1), 0);
                        if (len > maxLen) maxLen = len;
                    }
                }
                return { wch: maxLen + 3 };
            });
            ws['!cols'] = colWidths;

            // 6. 樣式定義
            const headerStyle = { 
                font: { bold: true, color: { rgb: "FFFFFF" } }, 
                fill: { fgColor: { rgb: "1E40AF" } },
                alignment: { horizontal: "center", vertical: "center" }
            };

            const sectionHeaderStyle = {
                font: { bold: true, size: 12, color: { rgb: "1E40AF" } },
                alignment: { horizontal: "left", vertical: "center" }
            };

            const subHeaderStyle = {
                font: { bold: true, color: { rgb: "374151" } },
                fill: { fgColor: { rgb: "E5E7EB" } },
                alignment: { horizontal: "center", vertical: "center" }
            };

            // 7. 遍歷工作表套用美化樣式
            const range = window.XLSX.utils.decode_range(ws['ref'] || ws['!ref']);
            for (let R = range.s.r; R <= range.e.r; ++R) {
                const configCellRef = window.XLSX.utils.encode_cell({ c: 1, r: R });
                const isFunctionalTestRow = ws[configCellRef] && ws[configCellRef].v === "Functional Test";

                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const cell_ref = window.XLSX.utils.encode_cell({ c: C, r: R });
                    if (!ws[cell_ref]) ws[cell_ref] = { t: "s", v: "" };
                    if (!ws[cell_ref].s) ws[cell_ref].s = {};
                    
                    // 基礎測試資料列對齊
                    if (R >= 4) ws[cell_ref].s.alignment = { horizontal: "center", vertical: "center" };
                    if (R === 4) ws[cell_ref].s = { ...ws[cell_ref].s, ...headerStyle };
                    
                    // 點選 Functional Test 列的背景色
                    if (R > 4 && isFunctionalTestRow && C !== range.e.c) {
                        ws[cell_ref].s.fill = { fgColor: { rgb: "FEF3C7" } };
                    }

                    // 測試結果 P/F/NA/- 色塊美化
                    if (R > 4 && R < summaryStartRow && C >= 7 && C <= 16) {
                        const cellValue = ws[cell_ref].v;
                        if (cellValue === "P") {
                            ws[cell_ref].s.fill = { fgColor: { rgb: "22C55E" } };
                            ws[cell_ref].s.font = { bold: true, color: { rgb: "FFFFFF" } };
                        } else if (cellValue === "F") {
                            ws[cell_ref].s.fill = { fgColor: { rgb: "F87171" } };
                            ws[cell_ref].s.font = { bold: true, color: { rgb: "FFFFFF" } };
                        } else if (cellValue === "NA") {
                            ws[cell_ref].s.fill = { fgColor: { rgb: "D1D5DB" } };
                            ws[cell_ref].s.font = { bold: true, color: { rgb: "374151" } };
                        } else if (cellValue === "-") {
                            ws[cell_ref].s.fill = { fgColor: { rgb: "DCFCE7" } };
                            ws[cell_ref].s.font = { bold: true, color: { rgb: "15803D" } };
                        }
                    }

                    // ─── 樣式加強：美化統計與摘要區塊 ───
                    if (R === summaryStartRow) {
                        ws[cell_ref].s = { ...ws[cell_ref].s, ...sectionHeaderStyle };
                    }
                    if (R === summaryStartRow + 1) {
                        ws[cell_ref].s = { ...ws[cell_ref].s, ...subHeaderStyle };
                        if (C === 4) { // Overall Status 字樣突出
                            ws[cell_ref].s.font = { bold: true, color: { rgb: failed > 0 ? "EF4444" : "16A34A" } };
                        }
                    }
                    // 統計圓餅圖各項目對應色塊
                    if (R > summaryStartRow + 1 && R <= summaryStartRow + 5 && C === 0) {
                        ws[cell_ref].s.alignment = { horizontal: "left" };
                        const metricName = ws[cell_ref].v;
                        if (metricName === "Pass") ws[cell_ref].s.font = { color: { rgb: "16A34A" }, bold: true };
                        if (metricName === "Fail") ws[cell_ref].s.font = { color: { rgb: "EF4444" }, bold: true };
                        if (metricName === "N/A") ws[cell_ref].s.font = { color: { rgb: "6B7280" }, bold: true };
                        if (metricName === "Ignored (-)") ws[cell_ref].s.font = { color: { rgb: "15803D" }, bold: true };
                    }

                    // ─── 樣式加強：美化失敗明細區塊 ───
                    if (R === failureDetailStartRow) {
                        ws[cell_ref].s = { ...ws[cell_ref].s, ...sectionHeaderStyle };
                        if (failSummaries.length > 0) ws[cell_ref].s.font.color = { rgb: "EF4444" };
                    }
                    if (R === failureDetailStartRow + 1) {
                        if (failSummaries.length === 0) {
                            ws[cell_ref].s = { alignment: { horizontal: "left" }, font: { italic: true, color: { rgb: "16A34A" } } };
                        } else {
                            ws[cell_ref].s = { ...ws[cell_ref].s, ...subHeaderStyle, fill: { fgColor: { rgb: "FEE2E2" } } };
                            ws[cell_ref].s.font.color = { rgb: "991B1B" };
                        }
                    }
                    if (R > failureDetailStartRow + 1 && failSummaries.length > 0) {
                        ws[cell_ref].s.fill = { fgColor: { rgb: "FEF2F2" } }; // 失敗細項整列淡紅底
                        if (C === 5) ws[cell_ref].s.font = { bold: true, color: { rgb: "EF4444" } }; // Shot # 標紅
                    }
                }
            }

            window.XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            window.XLSX.writeFile(wb, filename);
        }

        // ─── Main App ────────────────────────────────────────────────────────────
        function App() {
            // 安全修正：使用更穩固的方式解析當前檔名，並加上降級安全防禦
            const getStorageKey = (baseKey) => {
                try {
                    const rawPath = window.location.pathname;
                    // 使用 decodeURIComponent 安全處理解碼，避免特殊字元或空格出錯
                    const decodedPath = decodeURIComponent(rawPath);
                    const filename = decodedPath.split('/').pop() || 'default';
                    // 移除非英數中文的危險字元，只留下純文字名稱，確保 localStorage key 格式合法
                    const cleanFilename = filename.replace(/[^\w\s\u4e00-\u9fa5\.-]/g, '').trim();
                    return `${baseKey}_${cleanFilename || 'default'}`;
                } catch (e) {
                    console.error("Storage key parsing failed, fallback to global key:", e);
                    return baseKey; // 如果解析失敗，直接回傳預設 key，絕不讓網頁畫面空白
                }
            };

            const [info, setInfo] = useState(() => {
                const savedInfo = localStorage.getItem(getStorageKey("esd_info"));
                return savedInfo ? JSON.parse(savedInfo) : {
                    serial: "", product: "", stage: "", project: "",
                    date: new Date().toISOString().slice(0, 10),
                    tester: "", standard: "IEC 61000-4-2",
                    environment: "", humidity: "", temperature: "", remarks: "",
                    docNo: ""
                };
            });

            const [contactRows, setContactRows] = useState(() => {
                const savedContact = localStorage.getItem(getStorageKey("esd_contact_rows"));
                return savedContact ? JSON.parse(savedContact) : [];
            });

            const [airRows, setAirRows] = useState(() => {
                const savedAir = localStorage.getItem(getStorageKey("esd_air_rows"));
                return savedAir ? JSON.parse(savedAir) : [];
            });

            const [showSetup, setShowSetup] = useState(true);

            useEffect(() => {
                localStorage.setItem(getStorageKey("esd_info"), JSON.stringify(info));
            }, [info]);

            useEffect(() => {
                localStorage.setItem(getStorageKey("esd_contact_rows"), JSON.stringify(contactRows));
            }, [contactRows]);

            useEffect(() => {
                localStorage.setItem(getStorageKey("esd_air_rows"), JSON.stringify(airRows));
            }, [airRows]);

            function makeUpdater(setter) {
                return {
                    shot: (id, i, v) => setter((prev) => prev.map((r) => r.id !== id ? r : { ...r, shots: r.shots.map((s, si) => si === i ? v : s) })),
                    comment: (id, v) => setter((prev) => prev.map((r) => r.id !== id ? r : { ...r, comment: v })),
                    field: (id, field, v) => setter((prev) => prev.map((r) => r.id !== id ? r : { ...r, [field]: v })),
                    ftResult: (id, v) => setter((prev) => {
                        const currentIndex = prev.findIndex(r => r.id === id);
                        if (currentIndex === -1) return prev;
                        const currentFTRow = prev[currentIndex];
                        const previousValue = currentFTRow.ftResult;

                        return prev.map((r, idx) => {
                            if (r.id === id) return { ...r, ftResult: v };
                            if (idx > currentIndex) {
                                if (v === "F") {
                                    if (r.isFTRow) return { ...r, ftResult: "NA" };
                                    return { ...r, shots: r.shots.map(() => "NA") };
                                }
                                if (previousValue === "F" && v !== "F") {
                                    if (r.isFTRow && r.ftResult === "NA") return { ...r, ftResult: "" };
                                    if (!r.isFTRow && r.shots.every(s => s === "NA")) return { ...r, shots: r.shots.map(() => "") };
                                }
                            }
                            return r;
                        });
                    }),
                };
            }

            const contactOps = makeUpdater(setContactRows);
            const airOps = makeUpdater(setAirRows);

            const handleContactGenerate = (rows) => {
                const timestamp = generateTimestampDocNo();
                setInfo(prev => ({ ...prev, docNo: timestamp }));
                setContactRows(prev => [...prev, ...rows]);
            };

            const handleAirGenerate = (rows) => {
                const timestamp = generateTimestampDocNo();
                setInfo(prev => ({ ...prev, docNo: timestamp }));
                setAirRows(prev => [...prev, ...rows]);
            };

            const handleClearAll = () => {
                if (confirm("確定要清空所有測試表格與暫存資料嗎？")) {
                    setContactRows([]);
                    setAirRows([]);
                    setInfo(prev => ({
                        ...prev,
                        serial: "", product: "", stage: "", project: "",
                        tester: "", environment: "", humidity: "", temperature: "", remarks: "",
                        docNo: "", date: new Date().toISOString().slice(0, 10)
                    }));
                    localStorage.removeItem(getStorageKey("esd_info"));
                    localStorage.removeItem(getStorageKey("esd_contact_rows"));
                    localStorage.removeItem(getStorageKey("esd_air_rows"));
                }
            };

            const totalRows = [...contactRows, ...airRows];
            let tested = 0; let passed = 0; let failed = 0; let naCount = 0; let ignored = 0;

            for (let i = 0; i < totalRows.length; i++) {
                const row = totalRows[i];
                if (row.isFTRow) continue;

                const lastShotValue = row.shots[9]; 
                const isDischargeComplete = lastShotValue && lastShotValue !== "";

                if (isDischargeComplete) {
                    if (row.shots.includes("F")) { failed += 1; tested += 1; }
                    else if (row.shots.every(s => s === "-")) { ignored += 1; }
                    else if (row.shots.every(s => s === "NA")) { naCount += 1; }
                    else if (lastShotValue === "P" || row.shots.includes("P")) { passed += 1; tested += 1; }
                }
            }

            const failSummaries = [];
            totalRows.forEach((row) => {
                if (!row.isFTRow && row.shots.includes("F")) {
                    row.shots.forEach((shotVal, shotIdx) => {
                        if (shotVal === "F") {
                            const cleanLocation = row.location ? row.location.replace(/^\[\d+\]\s*/, '') : '';
                            failSummaries.push({
                                type: row.dischargeType, config: row.configuration, useCase: row.useCase,
                                voltage: row.voltage, location: cleanLocation, shotNum: shotIdx + 1
                            });
                        }
                    });
                }
            });

            return (
                <div className="max-w-full mx-auto bg-white rounded-xl shadow-md print:shadow-none">
                    <div className="bg-gradient-to-r from-blue-800 to-blue-600 rounded-t-xl px-8 py-5">
                        <div className="flex items-center justify-between">
                            <div>
                                <h1 className="text-white text-xl font-bold tracking-wider">ESD Test Record</h1>
                                <p className="text-blue-100 text-xs mt-1">Electrostatic Discharge Test ｜ IEC 61000-4-2 ｜ {SHOT_COUNT} Discharges per Location</p>
                            </div>
                            <span className="print:hidden bg-blue-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-sm animate-pulse">✓ 已啟用專案檔名獨立儲存</span>
                        </div>
                    </div>

                    <div className="px-8 py-5">
                        <div className="grid grid-cols-3 gap-x-8 gap-y-2.5 mb-6 pb-5 border-b border-gray-100">
                            <div className="flex items-center gap-2">
                                <span className="text-xs font-semibold text-gray-500 w-32 shrink-0">Unit Serial No.</span>
                                <div className="flex-1 flex items-center gap-1 border-b border-gray-200 py-0.5">
                                    <input type="text" value={info.serial} onChange={(e) => setInfo({ ...info, serial: e.target.value })} placeholder="Serial number" className="flex-1 text-sm text-gray-800 focus:outline-none bg-transparent placeholder-gray-300" />
                                    {info.docNo && <span className="text-xs font-medium text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded">_{info.docNo}</span>}
                                </div>
                            </div>
                            <InfoRow label="Project Name" value={info.project || ""} onChange={(v) => setInfo({ ...info, project: v })} placeholder="A99C" />
                            <InfoRow label="Stage" value={info.stage || ""} onChange={(v) => setInfo({ ...info, stage: v })} placeholder="Proto C" />
                            <InfoRow label="Test Date" value={info.date} onChange={(v) => setInfo({ ...info, date: v })} type="date" />
                            <InfoRow label="Tester" value={info.tester || ""} onChange={(v) => setInfo({ ...info, tester: v })} placeholder="Tester name" />
                            <InfoRow label="Standard" value={info.standard} onChange={(v) => setInfo({ ...info, standard: v })} placeholder="IEC 61000-4-2" />
                            <InfoRow label="Environment" value={info.environment || ""} onChange={(v) => setInfo({ ...info, environment: v })} placeholder="e.g. Laboratory" />
                            <InfoRow label="Humidity (%RH)" value={info.humidity || ""} onChange={(v) => setInfo({ ...info, humidity: v })} placeholder="40~55" />
                            <InfoRow label="Temperature (°C)" value={info.temperature || ""} onChange={(v) => setInfo({ ...info, temperature: v })} placeholder="15~30" />
                        </div>

                        <div className="mb-4 flex items-center gap-3 print:hidden">
                            <button onClick={() => setShowSetup((v) => !v)} className="text-xs text-gray-600 border border-gray-200 bg-gray-50 hover:bg-gray-100 px-3 py-1.5 rounded transition-colors cursor-pointer">
                                {showSetup ? "▲ Hide Setup" : "▼ Show Test Setup"}
                            </button>
                            {(contactRows.length > 0 || airRows.length > 0) && (
                                <button onClick={handleClearAll} className="text-xs text-red-500 border border-red-200 hover:bg-red-50 px-3 py-1.5 rounded transition-colors cursor-pointer font-semibold">Clear All & Reset</button>
                            )}
                        </div>

                        {showSetup && (
                            <div className="mb-6 print:hidden">
                                <TestSetupManager type="Contact" onGenerate={handleContactGenerate} />
                                <TestSetupManager type="Air" onGenerate={handleAirGenerate} />
                            </div>
                        )}

                        {contactRows.length === 0 && airRows.length === 0 ? (
                            <div className="border-2 border-dashed border-gray-200 rounded-xl py-12 text-center text-gray-400 print:hidden">
                                <div className="text-3xl mb-2">⚡</div>
                                <p className="text-sm">Fill in the Test Setup above and click <strong>Generate Contact / Air Table</strong></p>
                            </div>
                        ) : (
                            <>
                                <ESDTable rows={contactRows} type="Contact" onShotChange={contactOps.shot} onFTResultChange={contactOps.ftResult} onCommentChange={contactOps.comment} onRowFieldChange={contactOps.field} serialNumber={info.serial} docNo={info.docNo} onExport={() => exportRows(info, contactRows, "Contact", `ESD_Contact_${info.date || "report"}.xlsx`, info.docNo)} />
                                <ESDTable rows={airRows} type="Air" onShotChange={airOps.shot} onFTResultChange={airOps.ftResult} onCommentChange={airOps.comment} onRowFieldChange={airOps.field} serialNumber={info.serial} docNo={info.docNo} onExport={() => exportRows(info, airRows, "Air", `ESD_Air_${info.date || "report"}.xlsx`, info.docNo)} />
                            </>
                        )}

                        {(contactRows.length > 0 || airRows.length > 0) && (
                            <div className="grid grid-cols-6 gap-3 mb-6 mt-2">
                                <SummaryCard label="Total Tested Locations" value={String(tested)} color="text-gray-700" bg="bg-gray-50" border="border-gray-200" />
                                <SummaryCard label="Pass" value={String(passed)} color="text-green-600" bg="bg-green-50" border="border-green-200" />
                                <SummaryCard label="Fail" value={String(failed)} color="text-red-500" bg="bg-red-50" border="border-red-200" />
                                <SummaryCard label="N/A" value={String(naCount)} color="text-gray-500" bg="bg-gray-100" border="border-gray-200" />
                                <SummaryCard label="Ignored (-)" value={String(ignored)} color="text-green-700" bg="bg-green-50" border="border-green-100" />
                                <div className={`rounded-lg border-2 p-4 text-center ${tested === 0 ? "border-gray-200 bg-gray-50" : failed === 0 ? "border-green-300 bg-green-50" : "border-red-300 bg-red-50"}`}>
                                    <div className="text-xs text-gray-500 mb-1">Overall Result</div>
                                    <div className={`text-sm font-bold ${tested === 0 ? "text-gray-400" : failed === 0 ? "text-green-600" : "text-red-500"}`}>{tested === 0 ? "—" : failed === 0 ? "PASS ✓" : "FAIL ✗"}</div>
                                </div>
                            </div>
                        )}

                        <div className="mb-6">
                            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Test Result Summary</label>
                            <div className="flex gap-4 items-start">
                                <ESDPieChart passed={passed} failed={failed} naCount={naCount} ignored={ignored} />
                                <div className="flex-1">
                                    {failSummaries.length === 0 ? (
                                        <div className="w-full h-32 flex items-center border border-green-200 bg-green-50/50 rounded-lg px-4 text-sm text-green-700 font-medium">
                                            ✓ No failures detected. All test locations passed or were ignored.
                                        </div>
                                    ) : (
                                        <div className="w-full border border-red-200 bg-red-50/30 rounded-lg p-4 font-mono text-xs text-red-700 space-y-1.5 shadow-inner max-h-48 overflow-y-auto">
                                            <div className="font-bold border-b border-red-200 pb-1 mb-2 text-red-800 uppercase tracking-wider">❌ Detected Failure Details:</div>
                                            {failSummaries.map((fail, fIdx) => (
                                                <div key={fIdx} className="flex items-start gap-1 bg-white/60 p-2 rounded border border-red-100">
                                                    <span className="font-bold shrink-0">{fIdx + 1}.</span>
                                                    <div>
                                                        <span className="font-bold text-gray-900 bg-gray-100 px-1 rounded mr-1.5">{fail.type} Discharge</span>
                                                        <span>[Config: <strong className="text-gray-900 font-bold">{fail.config || "—"}</strong>] </span>
                                                        <span>[Use Case: <strong className="text-gray-900 font-normal">{fail.useCase || "—"}</strong>] </span>
                                                        <span>[Voltage: <strong className="text-blue-700 font-bold">{fail.voltage} kV</strong>] </span>
                                                        <span>[Location: <strong className="text-red-600 font-bold">{fail.location}</strong>] </span>
                                                        <span className="bg-red-100 text-red-800 font-bold px-1 rounded ml-1">Shot #{fail.shotNum} Failed</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-8 pt-5 border-t border-gray-100">
                            <SignBox label="Tester" />
                            <SignBox label="Reviewed" />
                            <SignBox label="Approved" />
                        </div>

                        <div className="mt-5 flex justify-end print:hidden">
                            <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white text-sm px-5 py-2 rounded-lg transition-colors cursor-pointer">Print</button>
                        </div>
                    </div>
                </div>
            );
        }

        function InfoRow({ label, value, onChange, placeholder, type = "text" }) {
            return (
                <div className="flex items-center gap-2">
                    <span className="text-xs font-semibold text-gray-500 w-32 shrink-0">{label}</span>
                    <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} className="flex-1 border-b border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-blue-400 py-0.5 bg-transparent placeholder-gray-300" />
                </div>
            );
        }

        function SummaryCard({ label, value, color, bg, border }) {
            return (
                <div className={`rounded-lg border p-4 text-center ${bg} ${border}`}>
                    <div className="text-xs text-gray-500 mb-1">{label}</div>
                    <div className={`text-xl font-bold ${color}`}>{value}</div>
                </div>
            );
        }

        function SignBox({ label }) {
            return (
                <div>
                    <div className="text-xs text-gray-500 mb-1">{label}</div>
                    <div className="h-14 border-b border-gray-300" />
                    <div className="text-xs text-gray-400 mt-1">Date: ________________</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
